<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>家庭庫存管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --bg:#F7F6F3;--surface:#FFF;--surface2:#F0EDE8;--ink:#1C1B18;
  --ink2:#6B6860;--ink3:#A8A49D;--accent:#2D6A4F;--accent-light:#D8EDDF;
  --warn:#C1440E;--warn-light:#FDEEE8;--warn-mid:#F4A27A;
  --yellow:#D97706;--yellow-light:#FEF3C7;
  --blue:#1D4ED8;--blue-light:#EFF6FF;
  --border:#E4E1DA;--radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(28,27,24,.07),0 4px 12px rgba(28,27,24,.05);
  --shadow-md:0 2px 8px rgba(28,27,24,.10),0 8px 24px rgba(28,27,24,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;padding-bottom:72px}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 14px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--accent)}
.header-right{display:flex;gap:5px;align-items:center}
.chip{font-size:11px;font-weight:600;border-radius:20px;padding:2px 8px;white-space:nowrap}
.chip-warn{background:var(--warn-light);color:var(--warn)}
.chip-ok{background:var(--accent-light);color:var(--accent)}
.btn-header-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}

/* 區域 Tab 列（第一層）*/
.loc-tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:99;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.loc-tabs-wrap::-webkit-scrollbar{display:none}
.loc-tabs{display:inline-flex;gap:0;padding:0 14px;max-width:100%}
.loc-tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.loc-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* 子位置 Tab 列（第二層）*/
.zone-tabs-wrap{background:var(--bg);padding:8px 14px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.zone-tabs-wrap::-webkit-scrollbar{display:none}
.zone-tab{display:inline-flex;padding:5px 14px;font-size:12px;font-weight:600;color:var(--ink2);border:1.5px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;margin-right:6px;font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.zone-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Bottom Tab */
.bottom-tab{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 0;border:none;background:transparent;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--ink3);transition:color .15s;position:relative}
.tab-btn.active{color:var(--accent)}
.tab-btn.active .tab-icon{background:var(--accent-light)}
.tab-icon{font-size:17px;width:34px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:11px}
.tab-badge{position:absolute;top:6px;right:calc(50% - 22px);background:var(--warn);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}

/* Pages */
.page{display:none}
.page.active{display:block}

/* 庫存頁內容區 */
.inv-content{max-width:600px;margin:0 auto;padding:10px 14px 8px}

/* 商品 Grid */
.item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.item-card{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:box-shadow .15s;position:relative;overflow:hidden}
.item-card:hover{box-shadow:var(--shadow-md)}
.item-card.st-expired{border-color:var(--warn);background:var(--warn-light)}
.item-card.st-low{border-color:var(--warn-mid)}
.item-card.st-soon{border-color:#FCD34D;background:var(--yellow-light)}
.item-card.st-ww{border-color:#93C5FD;background:var(--blue-light)}
.item-card-bar{position:absolute;top:0;left:0;right:0;height:3px}
.item-card.st-expired .item-card-bar,.item-card.st-low .item-card-bar{background:var(--warn)}
.item-card.st-soon .item-card-bar{background:var(--yellow)}
.item-card.st-ww .item-card-bar{background:var(--blue)}
.item-emoji{width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-top:4px}
.item-emoji img{width:36px;height:36px}
.fallback-emoji{font-size:32px;line-height:1}
.item-name{font-size:12px;font-weight:700;text-align:center;color:var(--ink);line-height:1.2;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.item-qty{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.item-qty.red{color:var(--warn)}
.item-qty.yellow{color:var(--yellow)}
.item-unit{font-size:10px;color:var(--ink3)}
.item-qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg);margin-top:2px}
.item-qty-btn{width:22px;height:20px;border:none;background:transparent;font-size:13px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.item-qty-btn:hover{background:var(--surface2)}
.item-qty-num{min-width:22px;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;line-height:20px}

/* 待補貨頁 */
.restock-page{max-width:600px;margin:0 auto;padding:14px 14px 8px}
.restock-sec{border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
.restock-sec.expired{background:var(--warn-light);border:1.5px solid var(--warn-mid)}
.restock-sec.low{background:var(--warn-light);border:1.5px solid var(--warn-mid)}
.restock-sec.soon{background:var(--yellow-light);border:1.5px solid #FCD34D}
.restock-sec.ww{background:var(--blue-light);border:1.5px solid #93C5FD}
.restock-head{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;font-weight:700;border-bottom:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.45)}
.restock-list{display:flex;flex-direction:column}
.restock-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid rgba(0,0,0,.05)}
.restock-row:last-child{border-bottom:none}
.restock-emoji{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.restock-emoji img{width:28px;height:28px}
.restock-info{flex:1;min-width:0}
.restock-name{font-weight:700;font-size:13px}
.restock-sub{font-size:11px;margin-top:1px}
.restock-sub.red{color:var(--warn)}
.restock-sub.yellow{color:var(--yellow)}
.restock-sub.blue{color:var(--blue)}
.restock-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.qty-btn{width:28px;height:28px;border:none;background:transparent;font-size:15px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--surface2)}
.qty-num{min-width:28px;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;line-height:28px}
.btn-cal{background:var(--warn);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-cal.yellow{background:var(--yellow)}

/* 查詢頁 */
.search-page{max-width:600px;margin:0 auto;padding:14px 14px 8px}
.s-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.s-row{display:flex;gap:8px}
.s-select{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;font-family:'Noto Sans TC',sans-serif}
.s-select:focus{border-color:var(--accent)}
.s-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;font-family:'Noto Sans TC',sans-serif}
.s-input:focus{border-color:var(--accent)}
.s-list{display:flex;flex-direction:column;gap:6px}
.s-item{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:box-shadow .15s}
.s-item:hover{box-shadow:var(--shadow-md)}
.s-item.expired,.s-item.low{border-color:var(--warn-mid);background:var(--warn-light)}
.s-item.soon{border-color:#FCD34D;background:var(--yellow-light)}
.s-item.ww{border-color:#93C5FD;background:var(--blue-light)}
.s-emoji{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-emoji img{width:28px;height:28px}
.si-left{flex:1;min-width:0}
.si-name{font-weight:700;font-size:14px}
.si-tags{font-size:11px;color:var(--ink3);margin-top:1px}
.si-right{text-align:right;flex-shrink:0}
.si-qty{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px}
.si-status{font-size:10px;font-weight:700;margin-top:2px}
.si-status.red{color:var(--warn)}
.si-status.yellow{color:var(--yellow)}
.si-status.blue{color:var(--blue)}
.si-status.green{color:var(--accent)}

/* 設定頁 */
.settings-page{max-width:600px;margin:0 auto;padding:14px 14px 8px}
.settings-sec{margin-bottom:20px}
.settings-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sg{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);overflow:hidden;margin-bottom:8px}
.sg-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.sg-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.sg-arrow{color:var(--ink3);font-size:12px;transition:transform .2s}
.sg-arrow.open{transform:rotate(90deg)}
.sg-body{border-top:1px solid var(--border);padding:8px 14px;display:none;flex-direction:column;gap:6px}
.sg-body.open{display:flex}
.sg-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--ink2)}
.btn-del-sm{border:none;background:none;color:var(--ink3);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px}
.btn-del-sm:hover{color:var(--warn)}
.add-inline{display:flex;gap:6px;margin-top:4px}
.add-inline input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;font-family:'Noto Sans TC',sans-serif;background:var(--bg)}
.add-inline input:focus{border-color:var(--accent)}
.btn-add-sm{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-add-group{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-lg);cursor:pointer;color:var(--ink3);font-size:13px;background:transparent;width:100%;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-bottom:4px}
.btn-add-group:hover{border-color:var(--accent);color:var(--accent)}

/* Login */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow-md);text-align:center}
.login-logo{font-size:40px;margin-bottom:12px}
.login-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--accent);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--ink3);margin-bottom:24px}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:20px;text-align:center;letter-spacing:8px;outline:none;font-family:'Space Grotesk',sans-serif;font-weight:700;background:var(--bg);color:var(--ink);transition:border-color .15s;margin-bottom:10px}
.login-input:focus{border-color:var(--accent)}
.login-err{font-size:12px;color:var(--warn);margin-bottom:10px;min-height:18px}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}

/* Sheet */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(28,27,24,.45);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease;padding-bottom:env(safe-area-inset-bottom,0)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.sheet-title{font-weight:700;font-size:15px}
.sheet-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:14px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.sheet-body{padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.sheet-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:var(--ink2)}
.field input,.field select,.field textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--ink);background:var(--bg);font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field-hint{font-size:11px;color:var(--ink3);margin-top:1px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pick-block{background:var(--accent-light);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.pick-block label{color:var(--accent)}
.pick-block select{border-color:#A7D7BF}
.loc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.loc-btn{padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--ink2);cursor:pointer;text-align:center;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.loc-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.zone-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.zone-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.zone-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.toggle-label{font-size:13px}
.switch{position:relative;display:inline-block;width:40px;height:22px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s}
.slider:before{position:absolute;content:'';height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--accent)}
input:checked+.slider:before{transform:translateX(18px)}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-danger{background:transparent;color:var(--warn);border:1.5px solid var(--warn-mid);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;max-width:90vw;overflow:hidden}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.empty-hint{text-align:center;padding:40px 16px;color:var(--ink3);font-size:13px}
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <div class="login-title">家庭庫存管理</div>
    <div class="login-sub">請輸入授權碼進入系統</div>
    <input class="login-input" id="authInput" type="password" maxlength="8" placeholder="••••" inputmode="numeric">
    <div class="login-err" id="authErr"></div>
    <button class="btn-login" onclick="doLogin()">進入</button>
  </div>
</div>

<!-- App -->
<div id="appWrap" style="display:none">
  <header>
    <div class="header-inner">
      <div class="logo">🏠 庫存管理</div>
      <div class="header-right">
        <span class="chip chip-warn" id="hWarn" style="display:none"></span>
        <span class="chip chip-ok"   id="hTotal"></span>
        <button class="btn-header-add" onclick="openAdd()">＋ 新增</button>
        <button onclick="window.open('https://mp65p.github.io/My-Schedule/','_blank')" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)" title="前往行事曆">📅</button>
        <button onclick="doLogout()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">⏏</button>
      </div>
    </div>
  </header>

  <!-- 區域 Tab（第一層）-->
  <div class="loc-tabs-wrap" id="locTabsWrap" style="display:none">
    <div class="loc-tabs" id="locTabs"></div>
  </div>
  <!-- 子位置 Tab（第二層）-->
  <div class="zone-tabs-wrap" id="zoneTabsWrap" style="display:none"></div>

  <!-- 庫存頁 -->
  <div class="page active" id="pageInv">
    <div class="inv-content">
      <div class="item-grid" id="invGrid"></div>
    </div>
  </div>

  <!-- 待補貨頁 -->
  <div class="page" id="pageRestock">
    <div class="restock-page" id="restockContent"></div>
  </div>

  <!-- 查詢頁 -->
  <div class="page" id="pageSearch">
    <div class="search-page">
      <div class="s-bar">
        <div class="s-row">
          <select class="s-select" id="fltLoc" onchange="renderSearch()"><option value="">全部區域</option></select>
          <select class="s-select" id="fltCat" onchange="renderSearch()"><option value="">全部分類</option></select>
        </div>
        <input class="s-input" id="fltKw" placeholder="🔍 搜尋商品名稱…" oninput="renderSearch()">
      </div>
      <div class="s-list" id="searchList"></div>
    </div>
  </div>

  <!-- 設定頁 -->
  <div class="page" id="pageSettings">
    <div class="settings-page">
      <div class="settings-sec">
        <div class="settings-title">📍 區域管理</div>
        <div id="locSettingsList"></div>
        <button class="btn-add-group" onclick="addLocationGroup()">＋ 新增區域</button>
      </div>
      <div class="settings-sec">
        <div class="settings-title">🗂 商品分類管理</div>
        <div id="catSettingsList"></div>
        <button class="btn-add-group" onclick="addCategoryGroup()">＋ 新增分類</button>
      </div>
      <div class="settings-sec">
        <div class="settings-title">🎨 商品圖示管理</div>
        <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">可自訂各商品的 emoji 圖示。</div>
        <div id="emojiSettingsList"></div>
      </div>
    </div>

function today(){return new Date().toISOString().slice(0,10);}
function addDays(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function diffDays(a,b){return Math.round((new Date(a)-new Date(b))/86400000);}
function fmtDate(d){if(!d)return '';return d.slice(5).replace('-','/');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);}

// ══════════════════════════════════
//  Status
// ══════════════════════════════════
function getStatus(it){
  var td=today();
  if(it.is3c){
    if(!it.warrantyEnd) return {type:'ok3c',label:'✓ 記錄中',cls:'green'};
    var wd=diffDays(it.warrantyEnd,td);
    if(wd<0) return {type:'we',label:'⚠️ 保固到期',cls:'red'};
    if(wd<=WARRANTY_WARN) return {type:'ww',label:'🔔 保固剩 '+wd+' 天',cls:'blue'};
    return {type:'ok3c',label:'✓ 保固中（剩 '+wd+' 天）',cls:'green'};
  }
  if(it.expiry&&it.expiry<td)
    return {type:'expired',label:'❗ 過期 '+diffDays(td,it.expiry)+' 天',cls:'red'};
  if(it.lastBuy&&it.interval){
    var nb=addDays(it.lastBuy,it.interval),diff=diffDays(nb,td);
    if(diff<=SOON_DAYS){
      var lbl=diff<0?'🕐 採購日過 '+Math.abs(diff)+' 天':diff===0?'🕐 今天採購':'🕐 還有 '+diff+' 天';
      if(it.qty<=it.threshold) lbl+='・剩'+it.qty+it.unit;
      return {type:'soon',label:lbl,cls:'yellow'};
    }
  }
  if(it.qty<=it.threshold)
    return {type:'low',label:'⚠️ 不足，剩 '+it.qty+' '+(it.unit||''),cls:'red'};
  return {type:'ok',label:'✓ 充足',cls:'green'};
}

function isAlert(it){
  var t=getStatus(it).type;
  return t==='expired'||t==='low'||t==='soon'||t==='ww'||t==='we';
}

//  Data
// ══════════════════════════════════
function loadData(){
  try{var r=localStorage.getItem(DATA_KEY);if(r)items=JSON.parse(r);}catch(e){items=[];}
  try{var l=localStorage.getItem(LOC_KEY); if(l)locations=JSON.parse(l);}catch(e){locations=[];}
  try{var c=localStorage.getItem(CAT_KEY); if(c)categories=JSON.parse(c);}catch(e){categories=[];}
  try{var f=localStorage.getItem(FAV_KEY); if(f)favs=JSON.parse(f);}catch(e){favs=[];}
  loadCustomEmoji();
  // 舊 id → 新 id 對照，移除舊版重複資料
  var OLD_ID_MAP={
    'tp':'toilet_paper','tissue':'tissue_box','trash':'trash_bag',
    'dish':'dish_soap','laundry':'laundry_detergent','toothp':'toothpaste',
    'rice':'white_rice','oil':'cooking_oil','soy':'soy_sauce',
    'bat':'bat_aa','egg':'egg','milk':'milk','water':'water','mask':'mask'
  };
  // 若新 id 已存在，刪除舊 id 的重複項
  Object.keys(OLD_ID_MAP).forEach(function(oldId){
    var newId=OLD_ID_MAP[oldId];
    var hasOld=items.find(function(i){return i.id===oldId;});
    var hasNew=items.find(function(i){return i.id===newId;});
    if(hasOld && hasNew){
      // 兩個都有 → 刪舊的
      items=items.filter(function(i){return i.id!==oldId;});
    } else if(hasOld && !hasNew){
      // 只有舊的 → 把 id 改成新的
      hasOld.id=newId;
    }
  });
  // 依名稱去除重複（保留第一筆）
  var seenNames={};
  items=items.filter(function(it){
    if(seenNames[it.name]) return false;
    seenNames[it.name]=true;
    return true;
  });
  DEFAULT_LOCATIONS.forEach(function(dl){
    if(!locations.find(function(l){return l.id===dl.id;}))
      locations.push({id:dl.id,name:dl.name,zones:dl.zones.slice()});
  });
  DEFAULT_CATEGORIES.forEach(function(dc){
    if(!categories.find(function(c){return c.id===dc.id;}))
      categories.push({id:dc.id,icon:dc.icon,name:dc.name,items:dc.items.slice()});
  });
  DEFAULT_ITEMS.forEach(function(di){
    if(!items.find(function(i){return i.id===di.id;}))
      items.push({id:di.id,name:di.name,cat:di.cat,unit:di.unit,qty:di.qty,
        threshold:di.threshold,location:di.location,zone:di.zone||'',
        interval:di.interval,lastBuy:'',expiry:'',is3c:false});
  });
  saveData();
}
function saveData(){
  try{localStorage.setItem(DATA_KEY,JSON.stringify(items));}catch(e){}
  try{localStorage.setItem(LOC_KEY, JSON.stringify(locations));}catch(e){}
  try{localStorage.setItem(CAT_KEY, JSON.stringify(categories));}catch(e){}
  try{localStorage.setItem(FAV_KEY, JSON.stringify(favs));}catch(e){}
}
function isFav(id){return favs.indexOf(id)>=0;}

function initLocTabs(){
  var usedLocs=new Set(items.map(function(i){return i.location;}));
  var activeLocs=locations.filter(function(l){return usedLocs.has(l.name);});
  if(activeLocs.length===0){document.getElementById('locTabsWrap').style.display='none';return;}
  document.getElementById('locTabsWrap').style.display='';
  if(!curLoc||!activeLocs.find(function(l){return l.name===curLoc;}))
    curLoc=activeLocs[0].name;
  renderLocTabs();
  renderZoneTabs();
}

function renderLocTabs(){
  var usedLocs=new Set(items.map(function(i){return i.location;}));
  var activeLocs=locations.filter(function(l){return usedLocs.has(l.name);});
  document.getElementById('locTabs').innerHTML=activeLocs.map(function(l){
    return '<button class="loc-tab'+(l.name===curLoc?' active':'')+'" onclick="selectLoc(\''+esc(l.name)+'\')">'+esc(l.name)+'</button>';
  }).join('');
}

function renderZoneTabs(){
  var loc=locations.find(function(l){return l.name===curLoc;});
  var wrap=document.getElementById('zoneTabsWrap');
  if(!loc||loc.zones.length===0){wrap.style.display='none';curZone='';return;}
  wrap.style.display='';
  // 確保 curZone 有效
  if(curZone&&loc.zones.indexOf(curZone)<0) curZone='';

function renderRestock(){
  var wrap=document.getElementById('restockContent');
  var groups={expired:[],low:[],soon:[],ww:[]};
  items.forEach(function(it){
    var st=getStatus(it);
    if(st.type==='expired'||st.type==='we') groups.expired.push({it:it,st:st});
    else if(st.type==='low')  groups.low.push({it:it,st:st});
    else if(st.type==='soon') groups.soon.push({it:it,st:st});
    else if(st.type==='ww')   groups.ww.push({it:it,st:Object.assign({},st,{cls:'blue'})});
  });
  var total=groups.expired.length+groups.low.length+groups.soon.length+groups.ww.length;
  if(total===0){wrap.innerHTML='<div class="empty-hint">🎉 目前沒有待補貨項目！</div>';return;}
  var html='';
  function sec(cls,icon,label,arr){
    if(!arr.length) return '';
    return '<div class="restock-sec '+cls+'">'
      +'<div class="restock-head">'+icon+' '+label+' （'+arr.length+'項）</div>'
      +'<div class="restock-list">'+arr.map(function(x){return restockRowHTML(x.it,x.st);}).join('')+'</div>'
      +'</div>';
  }
  html+=sec('expired','❗','過期警示',groups.expired);
  html+=sec('low',    '⚠️','庫存不足',groups.low);
  html+=sec('soon',   '🕐','建議採購',groups.soon);
  html+=sec('ww',     '🔔','保固提醒',groups.ww);
  wrap.innerHTML=html;
}

function restockRowHTML(it,st){
  var emoji=getEmoji(it.name,it.cat);
  var cal=!it.is3c?'<button class="btn-cal'+(st.type==='soon'?' yellow':'')+'" onclick="addToCalendar(\''+it.id+'\')">📅 加入行事曆</button>':'';
  var ctrl=!it.is3c
    ?'<div class="qty-ctrl"><button class="qty-btn" onclick="updateQty(\''+it.id+'\',-1)">−</button><div class="qty-num">'+it.qty+'</div><button class="qty-btn" onclick="updateQty(\''+it.id+'\',1)">＋</button></div>'
    :'<button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="openEdit(\''+it.id+'\')">詳情</button>';
  return '<div class="restock-row">'
    +'<div class="restock-emoji">'+renderEmoji(emoji,28)+'</div>'
    +'<div class="restock-info"><div class="restock-name">'+esc(it.name)+'</div>'
    +'<div class="restock-sub '+st.cls+'">'+st.label+'</div></div>'
    +'<div class="restock-actions">'+ctrl+cal+'</div>'

function updateQty(id,delta){
  var it=items.find(function(m){return m.id===id;});if(!it)return;
  it.qty=Math.max(0,it.qty+delta);
  saveData();renderAll();
  // 若在待補貨頁，即時更新
  if(document.getElementById('pageRestock').classList.contains('active')) renderRestock();
}

function addToCalendar(id){
  var it=items.find(function(m){return m.id===id;});if(!it||it.is3c)return;
  var qty=Math.max(1,(it.threshold*2)-it.qty);
  localStorage.setItem('inv_pending_purchase',JSON.stringify({
    item_id:it.id,item_name:it.name,quantity:qty,unit:it.unit||'個',
    subcategory:['fruit','veg','meat','frozen','grain','sauce','canned','drink','snack'].indexOf(it.cat)>=0?'food':'daily',
    source:'inventory_app'
  }));
  showToast('📅 開啟行事曆：'+it.name+' ×'+qty+(it.unit||''));
  setTimeout(function(){window.open(CAL_URL,'_blank');},600);
}

function pollDone(){
  // 舊 id → 新 id 對照（向下相容）
  var ID_MAP={
    'tp':'toilet_paper','tissue':'tissue_box','trash':'trash_bag',
    'dish':'dish_soap','laundry':'laundry_detergent','toothp':'toothpaste',
    'rice':'white_rice','oil':'cooking_oil','soy':'soy_sauce','bat':'bat_aa'
  };
  try{
    var raw=localStorage.getItem('inv_done_callbacks');
    if(!raw)return;
    var queue=JSON.parse(raw);
    if(!Array.isArray(queue)||queue.length===0)return;
    localStorage.removeItem('inv_done_callbacks');
    var changed=false;
    var acks=[];
    queue.forEach(function(cb){
      var itemId=cb.item_id;
      // 嘗試舊 id 對照
      if(!items.find(function(m){return m.id===itemId;})&&ID_MAP[itemId])
        itemId=ID_MAP[itemId];
      var it=items.find(function(m){return m.id===itemId;});
      if(!it)return;
      it.qty+=(cb.qty_added||1);
      it.lastBuy=cb.done_date||today();
      changed=true;
      acks.push({item_name:it.name,qty_added:(cb.qty_added||1)});   // 回報行事曆
      showToast('✅ 庫存更新：'+it.name+' +'+(cb.qty_added||1)+'（行事曆同步）');
    });
    if(acks.length){   // 回報行事曆 → 行事曆會跳「✅ 回傳成功」
      var prevAck=[]; try{prevAck=JSON.parse(localStorage.getItem('inv_update_ack')||'[]');}catch(e){}
      if(!Array.isArray(prevAck))prevAck=[];
      localStorage.setItem('inv_update_ack',JSON.stringify(prevAck.concat(acks)));
    }
    if(changed){
      saveData();renderAll();
      if(document.getElementById('pageRestock').classList.contains('active')) renderRestock();
    }
  }catch(e){}
}
setInterval(pollDone,3000);

    +'</select></div></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>購買金額</label><input id="fPrice" type="number" value="'+(it.price||'')+'" placeholder="例：12000"></div>'
    +'<div class="field"><label>購買通路</label><input id="fStore" value="'+esc(it.store||'')+'" placeholder="例：全國電子"></div>'
    +'</div>'
    +'<div class="field"><label>備註</label><textarea id="fNote" rows="2" style="resize:none" placeholder="序號、維修紀錄…">'+esc(it.note||'')+'</textarea></div>';
}

function openAdd(){
  editId=null;
  document.getElementById('sheetTitle').textContent='新增商品';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('sheetBody').innerHTML=
    '<div class="pick-block">'
    +'<div class="field"><label>① 選擇分類</label>'
    +'<select id="fCatPick" onchange="onAddCatChange()"><option value="">請選擇分類</option>'+catOpts('')+'</select></div>'
    +'<div class="field" id="itemPickField" style="display:none"><label>② 選擇商品</label>'
    +'<select id="fItemPick" onchange="onAddItemChange()"><option value="">請選擇商品</option></select></div>'
    +'<div class="field" id="customNameField" style="display:none"><label>② 商品名稱 *</label>'
    +'<input id="fNameCustom" placeholder="輸入商品名稱"></div>'
    +'</div>'
    +'<div class="field" id="locField"><label>📍 存放區域</label>'
    +'<div class="loc-grid">'+buildLocBtns(curLoc||'')+'</div>'
    +'<input type="hidden" id="fLoc" value="'+esc(curLoc||'')+'"></div>'
    +(curLoc?buildZoneHTML(curLoc,curZone||''):'')
    +'<div id="fNormal">'+normalFields()+'</div>'
    +'<div id="f3c" style="display:none">'+elecFields()+'</div>'
    +'<div class="toggle-row" style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">'
    +'<span class="toggle-label">⭐ 加入我的常用</span>'
    +'<label class="switch"><input type="checkbox" id="fFav"><span class="slider"></span></label>'
    +'</div>';
  document.getElementById('editOverlay').classList.add('open');
}

function onAddCatChange(){
  var catId=document.getElementById('fCatPick').value;
  var ipf=document.getElementById('itemPickField');
  var cnf=document.getElementById('customNameField');
  var fn=document.getElementById('fNormal');
  var f3=document.getElementById('f3c');
  if(!catId){ipf.style.display='none';cnf.style.display='none';return;}
  var is3c=catId===CAT_3C;
  fn.style.display=is3c?'none':'';f3.style.display=is3c?'':'none';
  var cat=categories.find(function(c){return c.id===catId;});
  // 全庫存已有名稱（不限分類）
  var usedNames=new Set(items.map(function(i){return i.name;}));
  if(cat&&cat.items.length>0){
    document.getElementById('fItemPick').innerHTML='<option value="">請選擇商品</option>'
      +cat.items.map(function(item){
        var used=usedNames.has(item);
        return '<option value="'+esc(item)+'"'+(used?' disabled style="color:#bbb"':'')+'>'+item+(used?' ✓ 已加入':'')+'</option>';
      }).join('')+'<option value="__custom__">＋ 自行輸入</option>';
    ipf.style.display='';cnf.style.display='none';
  } else {ipf.style.display='none';cnf.style.display='';}
}
function onAddItemChange(){
  var val=document.getElementById('fItemPick').value;
  var cnf=document.getElementById('customNameField');
  if(val==='__custom__'){cnf.style.display='';document.getElementById('fNameCustom').focus();}
  else{cnf.style.display='none';}
}

function openEdit(id){
  var it=items.find(function(m){return m.id===id;});if(!it)return;
  editId=id;
  document.getElementById('sheetTitle').textContent='編輯：'+it.name;
  document.getElementById('btnDelete').style.display='';
  document.getElementById('sheetBody').innerHTML=
    '<div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:12px 14px">'
    +'<div style="font-size:40px;line-height:1">'+renderEmoji(getEmoji(it.name,it.cat),40)+'</div>'
    +'<div><div style="font-weight:700;font-size:16px">'+esc(it.name)+'</div>'
    +'<div style="font-size:12px;color:var(--ink3)">'+esc(it.location||'')+(it.zone?'・'+esc(it.zone):'')+'</div></div>'
    +'</div>'
    +'<div class="field"><label>分類</label><select id="fCatEdit">'+catOpts(it.cat||'')+'</select></div>'
    +'<div class="field" id="locField"><label>📍 存放區域</label>'
    +'<div class="loc-grid">'+buildLocBtns(it.location||'')+'</div>'
    +'<input type="hidden" id="fLoc" value="'+esc(it.location||'')+'"></div>'
    +buildZoneHTML(it.location||'',it.zone||'')
    +(it.is3c?elecFields(it):normalFields(it))
    +'<div class="toggle-row" style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">'
    +'<span class="toggle-label">⭐ 加入我的常用</span>'
    +'<label class="switch"><input type="checkbox" id="fFav"'+(isFav(id)?' checked':'')+"><span class='slider'></span></label>"
    +'</div>';
  document.getElementById('editOverlay').classList.add('open');
}

function closeSheet(){document.getElementById('editOverlay').classList.remove('open');editId=null;}

function saveItem(){
  var loc=(document.getElementById('fLoc')||{}).value||'';
  var zone=(document.getElementById('fZone')||{}).value||'';
  var fav=document.getElementById('fFav')&&document.getElementById('fFav').checked;
  if(editId){
    var it=items.find(function(m){return m.id===editId;});if(!it)return;
    it.cat=(document.getElementById('fCatEdit')||{}).value||it.cat;
    it.location=loc||it.location;it.zone=zone;
    if(fav&&!isFav(editId))favs.push(editId);
    else if(!fav&&isFav(editId))favs.splice(favs.indexOf(editId),1);
    if(it.is3c){
      it.model  =(document.getElementById('fModel')||{}).value||'';
      it.buyDate=(document.getElementById('fBuyDate')||{}).value||'';
      it.price  =parseInt((document.getElementById('fPrice')||{}).value)||null;
      it.store  =(document.getElementById('fStore')||{}).value||'';
      it.note   =(document.getElementById('fNote')||{}).value||'';
      var wy=parseInt((document.getElementById('fWY')||{}).value)||0;
      it.warrantyYears=wy||null;
      it.warrantyEnd=wy&&it.buyDate?addDays(it.buyDate,wy*365):'';
    } else {
      it.unit     =(document.getElementById('fUnit')||{}).value||'個';
      it.qty      =parseInt((document.getElementById('fQty')||{}).value)||0;
      it.threshold=parseInt((document.getElementById('fThreshold')||{}).value)||1;
      it.lastBuy  =(document.getElementById('fLastBuy')||{}).value||'';
      it.interval =parseInt((document.getElementById('fInterval')||{}).value)||null;
      it.expiry   =(document.getElementById('fExpiry')||{}).value||'';
    }
    saveData();closeSheet();showToast('✅ 已儲存「'+it.name+'」');
    renderAll();initLocTabs();return;
  }
  var catId=(document.getElementById('fCatPick')||{}).value||'other';
  var is3c=catId===CAT_3C;
  var name='',newId='u_'+uid();
  var itemVal=(document.getElementById('fItemPick')||{}).value||'';
  if(itemVal==='__custom__'||!itemVal){name=((document.getElementById('fNameCustom')||{}).value||'').trim();}
  else{name=itemVal;}
  if(!name){showToast('⚠️ 請輸入商品名稱');return;}
  if(!loc){showToast('⚠️ 請選擇存放區域');return;}
  // 重複名稱檢查
  if(items.find(function(i){return i.name===name;})){
    showToast('⚠️「'+name+'」已存在庫存中');return;
  }
  var ni={id:newId,name:name,cat:catId,location:loc,zone:zone,is3c:is3c};
  if(is3c){
    ni.model  =(document.getElementById('fModel')||{}).value||'';
    ni.buyDate=(document.getElementById('fBuyDate')||{}).value||'';
    ni.price  =parseInt((document.getElementById('fPrice')||{}).value)||null;
    ni.store  =(document.getElementById('fStore')||{}).value||'';
    ni.note   =(document.getElementById('fNote')||{}).value||'';
    var wy2=parseInt((document.getElementById('fWY')||{}).value)||0;
    ni.warrantyYears=wy2||null;
    ni.warrantyEnd=wy2&&ni.buyDate?addDays(ni.buyDate,wy2*365):'';
  } else {
    ni.unit     =(document.getElementById('fUnit')||{}).value||'個';
    ni.qty      =parseInt((document.getElementById('fQty')||{}).value)||0;
    ni.threshold=parseInt((document.getElementById('fThreshold')||{}).value)||1;
    ni.lastBuy  =(document.getElementById('fLastBuy')||{}).value||'';
    ni.interval =parseInt((document.getElementById('fInterval')||{}).value)||null;
    ni.expiry   =(document.getElementById('fExpiry')||{}).value||'';
  }
  items.push(ni);
  if(fav)favs.push(newId);
  saveData();closeSheet();showToast('✅ 已新增「'+name+'」');
  renderAll();initLocTabs();
}

function deleteItem(){
  if(!editId)return;
  var it=items.find(function(m){return m.id===editId;});
  var name=it?it.name:'';
  items=items.filter(function(m){return m.id!==editId;});
  favs=favs.filter(function(f){return f!==editId;});
  saveData();closeSheet();showToast('🗑 已刪除「'+name+'」');
  renderAll();initLocTabs();
}

// ══════════════════════════════════
//  Tab
// ══════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var pageMap={inv:'pageInv',restock:'pageRestock',search:'pageSearch',settings:'pageSettings'};
  var tabMap ={inv:'tabInv', restock:'tabRestock', search:'tabSearch', settings:'tabSettings'};
  document.getElementById(pageMap[tab]).classList.add('active');
  document.getElementById(tabMap[tab]).classList.add('active');
  // 顯示/隱藏區域 Tab
  var showLocTabs=tab==='inv';
  document.getElementById('locTabsWrap').style.display=showLocTabs?'':'none';
  document.getElementById('zoneTabsWrap').style.display=(showLocTabs&&document.getElementById('zoneTabsWrap').innerHTML)?'':'none';
  if(tab==='restock'){renderRestock();}
  if(tab==='search'){renderSearchFilters();renderSearch();}
  if(tab==='settings')renderSettings();
}

// ══════════════════════════════════
//  Toast
// ══════════════════════════════════
var _tt;
function showToast(msg){
  var t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');clearTimeout(_tt);
  _tt=setTimeout(function(){t.classList.remove('show');},3000);
}

document.getElementById('editOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeSheet();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});

// ══════════════════════════════════
//  Init
// ══════════════════════════════════
if(localStorage.getItem(AUTH_KEY)==='1'){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appWrap').style.display='block';
  loadData();initLocTabs();renderAll();
}
</script>
